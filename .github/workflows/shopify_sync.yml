name: Shopify → Firestore Sync

on:
  workflow_dispatch:
    inputs:
      hours:
        description: 'Hours to look back (default: uses SYNC_LOOKBACK_MINUTES env, or 10 min)'
        required: false
        type: string
        default: ''
      date:
        description: 'Sync a specific date (YYYY-MM-DD, e.g. 2026-05-17). Overrides hours.'
        required: false
        type: string
        default: ''

  repository_dispatch:
    types: [shopify-sync]

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Shopify sync
        env:
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SYNC_LOOKBACK_HOURS: ${{ github.event.inputs.hours || github.event.client_payload.hours || '' }}
          SYNC_DATE: ${{ github.event.inputs.date || github.event.client_payload.date || '' }}
        run: python shopify_sync.py
